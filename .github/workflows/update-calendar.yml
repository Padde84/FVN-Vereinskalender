name: Update Vereinsspielplan ICS

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-calendar:
    runs-on: ubuntu-latest

    steps:
      - name: Repo auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Abhängigkeiten installieren
        run: pip install -r requirements.txt

      - name: ICS erzeugen
        run: python generate_ics.py

      - name: Änderungen committen
        run: |
          git config user.name "calendar-bot"
          git config user.email "calendar-bot@example.com"
          git add vereinsspielplan.ics
          git commit -m "Update Vereinsspielplan ICS" || echo "Keine Änderungen"
          git push
